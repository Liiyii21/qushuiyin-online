<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册 - 视频水印去除工具</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <h1>🎬 视频水印去除工具</h1>
                <p>支持小红书、抖音、视频号等平台</p>
            </div>

            <!-- 登录表单 -->
            <div id="loginForm" class="form-container active">
                <h2>登录账号</h2>
                <form id="loginFormElement">
                    <div class="input-group">
                        <label>用户名</label>
                        <input type="text" id="loginUsername" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                    <div class="remember-me">
                        <label>
                            <input type="checkbox" id="rememberMe">
                            <span>记住我</span>
                        </label>
                    </div>
                    <button type="submit" class="btn-primary">登录</button>
                </form>
                <div class="form-footer">
                    <p>还没有账号？<a href="#" id="showRegister">立即注册</a></p>
                </div>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="form-container">
                <h2>注册账号</h2>
                <form id="registerFormElement">
                    <div class="input-group">
                        <label>用户名</label>
                        <input type="text" id="registerUsername" placeholder="请输入用户名（3-20个字符）" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label>密码</label>
                        <input type="password" id="registerPassword" placeholder="请输入密码（至少6个字符）" required autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <label>确认密码</label>
                        <input type="password" id="registerPasswordConfirm" placeholder="请再次输入密码" required autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <label>邮箱（可选）</label>
                        <input type="email" id="registerEmail" placeholder="请输入邮箱" autocomplete="email">
                    </div>
                    <button type="submit" class="btn-primary">注册</button>
                </form>
                <div class="form-footer">
                    <p>已有账号？<a href="#" id="showLogin">立即登录</a></p>
                </div>
            </div>

            <div id="message" class="message hidden"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
