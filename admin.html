<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清影无痕去水印 - 管理后台</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h2>🎬 清影无痕去水印</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="icon">📊</span>
                    <span>数据概览</span>
                </a>
                <a href="#" class="nav-item" data-page="users">
                    <span class="icon">👥</span>
                    <span>用户管理</span>
                </a>
                <a href="#" class="nav-item" data-page="logs">
                    <span class="icon">📝</span>
                    <span>使用记录</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <span class="icon">⚙️</span>
                    <span>系统设置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="backToMainBtn" class="btn-secondary">返回主页</button>
                <button id="adminLogoutBtn" class="btn-logout">退出登录</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <div class="page-title">
                    <h1 id="pageTitle">数据概览</h1>
                </div>
                <div class="user-info">
                    <span>管理员：<strong id="adminUsername"></strong></span>
                </div>
            </header>

            <!-- 数据概览页面 -->
            <div id="dashboardPage" class="page-content active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-info">
                            <h3>总用户数</h3>
                            <p class="stat-value" id="totalUsers">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🎬</div>
                        <div class="stat-info">
                            <h3>解析次数</h3>
                            <p class="stat-value" id="totalParses">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⬇️</div>
                        <div class="stat-info">
                            <h3>下载次数</h3>
                            <p class="stat-value" id="totalDownloads">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🌐</div>
                        <div class="stat-info">
                            <h3>今日访问</h3>
                            <p class="stat-value" id="todayVisits">0</p>
                        </div>
                    </div>
                </div>

                <div class="chart-section">
                    <div class="chart-card">
                        <h3>最近7天使用趋势</h3>
                        <div id="usageChart" class="chart-placeholder">
                            <canvas id="chartCanvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 用户管理页面 -->
            <div id="usersPage" class="page-content">
                <div class="page-header">
                    <h2>用户列表</h2>
                    <div class="search-box">
                        <input type="text" id="userSearch" placeholder="搜索用户名或邮箱...">
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>注册时间</th>
                                <th>使用次数</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 使用记录页面 -->
            <div id="logsPage" class="page-content">
                <div class="page-header">
                    <h2>使用记录</h2>
                    <div class="filter-box">
                        <select id="logFilter">
                            <option value="all">全部记录</option>
                            <option value="parse">解析记录</option>
                            <option value="download">下载记录</option>
                            <option value="login">登录记录</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>用户</th>
                                <th>操作类型</th>
                                <th>详情</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 系统设置页面 -->
            <div id="settingsPage" class="page-content">
                <div class="settings-section">
                    <h2>系统设置</h2>
                    
                    <div class="setting-card">
                        <h3>API 配置</h3>
                        <div class="form-group">
                            <label>API 密钥</label>
                            <input type="text" id="apiKey" placeholder="输入 API 密钥">
                        </div>
                        <div class="form-group">
                            <label>API 地址</label>
                            <input type="text" id="apiUrl" placeholder="输入 API 地址">
                        </div>
                        <button class="btn-primary" id="saveApiBtn">保存 API 配置</button>
                    </div>

                    <div class="setting-card">
                        <h3>系统维护</h3>
                        <div class="maintenance-actions">
                            <button class="btn-warning" id="clearLogsBtn">清空使用记录</button>
                            <button class="btn-warning" id="clearStatsBtn">重置统计数据</button>
                            <button class="btn-danger" id="clearAllDataBtn">清空所有数据</button>
                        </div>
                    </div>

                    <div class="setting-card">
                        <h3>数据导出</h3>
                        <div class="export-actions">
                            <button class="btn-secondary" id="exportUsersBtn">导出用户数据</button>
                            <button class="btn-secondary" id="exportLogsBtn">导出使用记录</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 用户详情弹窗 -->
    <div id="userModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>用户详情</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="userModalBody">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
