<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>清影无痕去水印 - 在线版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #d4d4d4;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        header h1 {
            color: #00d4ff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .card h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-section label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1em;
            font-family: inherit;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="url"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #7877c6 100%);
            color: white;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .result-section {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-section h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .result-text {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.9);
            word-break: break-all;
            line-height: 1.6;
        }

        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #00d4ff 0%, #7877c6 100%);
            color: white;
            border-color: #00d4ff;
        }

        .mode-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .feature-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .feature-card h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .feature-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95em;
        }

        .header-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .header-btn {
            padding: 10px 20px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 8px;
            color: #00d4ff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .header-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .logo-click-area {
            cursor: pointer;
            user-select: none;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: rgba(255, 255, 255, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 40px;
        }

        .success-message {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: #00ff88;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header-buttons">
        <div id="userInfo" style="display: none; display: flex; align-items: center; gap: 15px;">
            <span id="username" style="color: #00d4ff; font-weight: 600;"></span>
            <button id="logoutBtn" class="header-btn" style="padding: 8px 16px; font-size: 0.9em;">🚪 登出</button>
        </div>
        <div id="authButtons" style="display: flex; gap: 10px;">
            <a href="auth.html" class="header-btn" onclick="return navigateToAuth(event)">📝 注册</a>
            <a href="auth.html" class="header-btn" onclick="return navigateToAuth(event)">🔐 登录</a>
        </div>
    </div>
    <div class="container">
        <header>
            <h1 class="logo-click-area">🎬 清影无痕去水印</h1>
            <p>专业视频处理 · 智能文案优化</p>
        </header>

        <div class="main-content">
            <!-- 视频去水印 -->
            <div class="card">
                <h2>🎬 视频去水印</h2>
                
                <div class="input-section">
                    <label>粘贴视频链接</label>
                    <input type="url" id="videoUrl" placeholder="输入小红书/抖音/视频号分享链接...">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="parseVideo()">🔍 解析视频</button>
                    <button class="btn-secondary" onclick="clearVideoForm()">🗑️ 清空</button>
                </div>

                <div class="result-section" id="videoResult">
                    <h3>✅ 解析成功</h3>
                    <div class="result-text" id="videoResultText"></div>
                    <div class="button-group" style="margin-top: 15px;">
                        <button class="btn-primary" onclick="copyVideoLink()">📋 复制链接</button>
                    </div>
                </div>

                <div class="success-message" id="videoSuccess"></div>
            </div>

            <!-- 文案改写 -->
            <div class="card">
                <h2>✍️ 文案改写</h2>

                <div class="input-section">
                    <label>选择改写模式</label>
                    <div class="mode-buttons">
                        <button class="mode-btn active" onclick="selectMode('standard', this)">标准改写</button>
                        <button class="mode-btn" onclick="selectMode('professional', this)">专业化</button>
                        <button class="mode-btn" onclick="selectMode('casual', this)">口语化</button>
                        <button class="mode-btn" onclick="selectMode('creative', this)">创意化</button>
                    </div>
                </div>

                <div class="input-section">
                    <label>输入原始文案</label>
                    <textarea id="originalText" placeholder="请输入需要改写的文案内容..."></textarea>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="rewriteText()">🔄 开始改写</button>
                    <button class="btn-secondary" onclick="clearTextForm()">🗑️ 清空</button>
                </div>

                <div class="result-section" id="rewriteResult">
                    <h3>✅ 改写完成</h3>
                    <div class="result-text" id="rewriteResultText"></div>
                    <div class="button-group" style="margin-top: 15px;">
                        <button class="btn-primary" onclick="copyRewriteResult()">📋 复制结果</button>
                        <button class="btn-secondary" onclick="downloadRewriteResult()">💾 下载文本</button>
                    </div>
                </div>

                <div class="success-message" id="rewriteSuccess"></div>
            </div>
        </div>

        <!-- 功能特性 -->
        <div class="features">
            <!-- 小红书 -->
            <div class="feature-card">
                <div class="feature-icon">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 70px; height: 70px;">
                        <rect width="200" height="200" fill="#FF2B2B" rx="40"/>
                        <text x="100" y="130" font-size="90" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">小</text>
                    </svg>
                </div>
                <h3>小红书</h3>
                <p>支持小红书视频解析和下载</p>
            </div>
            <!-- 抖音 -->
            <div class="feature-card">
                <div class="feature-icon">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 70px; height: 70px;">
                        <defs>
                            <linearGradient id="douyin-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#25F4EE;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#FF2B2B;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect width="200" height="200" fill="url(#douyin-gradient)" rx="40"/>
                        <circle cx="70" cy="80" r="15" fill="white"/>
                        <circle cx="130" cy="80" r="15" fill="white"/>
                        <path d="M 80 120 Q 100 140 120 120" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
                <h3>抖音</h3>
                <p>支持抖音视频解析和下载</p>
            </div>
            <!-- 视频号 -->
            <div class="feature-card">
                <div class="feature-icon">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 70px; height: 70px;">
                        <rect width="200" height="200" fill="#09B83E" rx="40"/>
                        <rect x="50" y="50" width="100" height="100" fill="white" rx="8"/>
                        <polygon points="80,75 80,125 130,100" fill="#09B83E"/>
                    </svg>
                </div>
                <h3>视频号</h3>
                <p>支持视频号视频解析和下载</p>
            </div>
            <!-- 智能改写 -->
            <div class="feature-card">
                <div class="feature-icon">✨</div>
                <h3>智能改写</h3>
                <p>多种改写模式，满足不同场景需求</p>
            </div>
        </div>

        <footer>
            <p>© 2026 清影无痕去水印 | 专业视频处理平台</p>
            <p style="margin-top: 10px; font-size: 0.9em;">
                <a href="https://github.com" style="color: #00d4ff; text-decoration: none;">GitHub</a> | 
                免责声明：本工具仅供学习交流使用，请遵守相关法律法规
            </p>
        </footer>
    </div>

    <script>
        let currentMode = 'standard';
        let logoClickCount = 0;
        let logoClickTimer = null;

        // 导航到登录/注册页面
        function navigateToAuth(event) {
            event.preventDefault();
            // 使用完整的 GitHub Pages URL
            window.location.href = 'https://liiyii21.github.io/qushuiyin-online/auth.html';
            return false;
        }

        // 检查登录状态并显示用户信息
        function checkLoginStatus() {
            const currentUser = localStorage.getItem('video_tool_current_user') || sessionStorage.getItem('video_tool_current_user');
            const userInfoDiv = document.getElementById('userInfo');
            const authButtonsDiv = document.getElementById('authButtons');
            const usernameSpan = document.getElementById('username');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (currentUser) {
                const user = JSON.parse(currentUser);
                usernameSpan.textContent = `👤 ${user.username}`;
                userInfoDiv.style.display = 'flex';
                authButtonsDiv.style.display = 'none';
                
                // 登出功能
                logoutBtn.addEventListener('click', function() {
                    localStorage.removeItem('video_tool_current_user');
                    sessionStorage.removeItem('video_tool_current_user');
                    location.reload();
                });
            } else {
                userInfoDiv.style.display = 'none';
                authButtonsDiv.style.display = 'flex';
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面已加载');
            
            // 检查登录状态
            checkLoginStatus();
            
            // 添加隐藏的后台管理系统入口
            const logoElement = document.querySelector('.logo-click-area');
            if (logoElement) {
                logoElement.addEventListener('click', function() {
                    logoClickCount++;
                    
                    // 清除之前的计时器
                    if (logoClickTimer) {
                        clearTimeout(logoClickTimer);
                    }
                    
                    // 如果5秒内没有继续点击，重置计数
                    logoClickTimer = setTimeout(() => {
                        logoClickCount = 0;
                    }, 5000);
                    
                    // 点击5下时跳转到后台管理系统
                    if (logoClickCount === 5) {
                        logoClickCount = 0;
                        clearTimeout(logoClickTimer);
                        window.location.href = 'admin.html';
                    }
                });
            }
        });

        // 选择改写模式
        function selectMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
        }

        // 解析视频
        function parseVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            const result = document.getElementById('videoResult');

            if (!url) {
                alert('请输入视频链接');
                return;
            }

            if (!url.includes('http')) {
                alert('请输入有效的链接');
                return;
            }

            // 调用 API 解析视频
            parseVideoWithAPI(url, result);
        }

        // 使用 API 解析视频
        function parseVideoWithAPI(url, resultElement) {
            const apiUrl = 'https://api.wxshares.com/api/qsy/plus';
            const apiKey = 'puM4bNPd7nBIFcRXBUgvfutGzE';

            fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    url: url
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success || data.code === 0) {
                    const videoData = data.data || data;
                    document.getElementById('videoResultText').innerHTML = `
                        <div style="margin-bottom: 15px;">
                            <strong>✅ 解析成功</strong><br><br>
                            <strong>视频标题：</strong> ${videoData.title || '未获取'}<br>
                            <strong>视频描述：</strong> ${videoData.desc || '未获取'}<br>
                            <strong>无水印链接：</strong><br>
                            <code style="background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; display: block; word-break: break-all; font-size: 0.9em; margin-top: 8px;">
                                ${videoData.video || videoData.url || '获取中...'}
                            </code>
                        </div>
                    `;
                    resultElement.classList.add('show');
                } else {
                    showError('解析失败，请检查链接是否正确');
                }
            })
            .catch(error => {
                console.error('API 错误:', error);
                // 降级处理：显示演示信息
                document.getElementById('videoResultText').innerHTML = `
                    <div style="margin-bottom: 15px;">
                        <strong>✅ 链接已识别</strong><br><br>
                        <strong>输入链接：</strong><br>
                        <code style="background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; display: block; word-break: break-all; font-size: 0.9em;">${url}</code><br><br>
                        <strong>说明：</strong><br>
                        此在线版本为演示版本。<br>
                        完整功能请使用本地版本。<br><br>
                        <strong>本地版本功能：</strong>
                        <ul style="margin-left: 20px; margin-top: 10px;">
                            <li>✓ 完整的视频解析</li>
                            <li>✓ 视频下载</li>
                            <li>✓ 文案改写</li>
                            <li>✓ 违禁词检测</li>
                        </ul>
                    </div>
                `;
                resultElement.classList.add('show');
            });
        }

        // 复制视频链接
        function copyVideoLink() {
            const url = document.getElementById('videoUrl').value;
            if (url) {
                navigator.clipboard.writeText(url).then(() => {
                    showSuccess('videoSuccess', '✅ 链接已复制到剪贴板');
                });
            }
        }

        // 改写文案
        function rewriteText() {
            const text = document.getElementById('originalText').value.trim();
            const result = document.getElementById('rewriteResult');

            if (!text) {
                alert('请输入需要改写的文案');
                return;
            }

            const rewrittenText = performRewrite(text, currentMode);
            document.getElementById('rewriteResultText').textContent = rewrittenText;
            result.classList.add('show');
        }

        // 改写函数
        function performRewrite(text, mode) {
            const replacements = {
                standard: {
                    '很': '非常',
                    '好': '优秀',
                    '不错': '很棒',
                    '可以': '值得',
                    '喜欢': '热爱',
                    '想': '期待'
                },
                professional: {
                    '很': '相当',
                    '好': '优质',
                    '不错': '卓越',
                    '可以': '可行',
                    '喜欢': '倾向',
                    '想': '建议'
                },
                casual: {
                    '非常': '超',
                    '优秀': '牛',
                    '很棒': '棒棒',
                    '值得': '必须',
                    '热爱': '爱死了',
                    '期待': '想要'
                },
                creative: {
                    '很': '贼',
                    '好': '绝了',
                    '不错': '妙不可言',
                    '可以': '绝对可以',
                    '喜欢': '沉迷',
                    '想': '梦想'
                }
            };

            let result = text;
            const modeReplacements = replacements[mode] || replacements.standard;
            
            for (const [key, value] of Object.entries(modeReplacements)) {
                result = result.replace(new RegExp(key, 'g'), value);
            }

            return result;
        }

        // 复制改写结果
        function copyRewriteResult() {
            const text = document.getElementById('rewriteResultText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                showSuccess('rewriteSuccess', '✅ 结果已复制到剪贴板');
            });
        }

        // 下载改写结果
        function downloadRewriteResult() {
            const text = document.getElementById('rewriteResultText').textContent;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `改写结果_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 清空表单
        function clearVideoForm() {
            document.getElementById('videoUrl').value = '';
            document.getElementById('videoResult').classList.remove('show');
        }

        function clearTextForm() {
            document.getElementById('originalText').value = '';
            document.getElementById('rewriteResult').classList.remove('show');
        }

        // 显示成功信息
        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
            
            setTimeout(() => {
                element.classList.remove('show');
            }, 2000);
        }

        // 显示错误信息
        function showError(message) {
            alert('❌ ' + message);
        }
    </script>
</body>
</html>
